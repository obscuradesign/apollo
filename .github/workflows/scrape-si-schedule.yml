name: Scrape SI Schedule

on:
  schedule:
    # Runs at midnight every Sunday and Wednesday
    - cron: '0 0 * * 0,3'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # Check out with full history if needed, though default is fine
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SI Scraper
        run: python si_harvester.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated SI schedule update"
          file_pattern: "src/data/siSchedule.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
